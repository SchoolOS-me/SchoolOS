volumes:
  web_backend_db_data:
    name: "${PROJECT_NAME}-web-backend-db-data"
    external: true

  web_backend_staticfiles: {}

  redis_cache:
    driver: local

services:
  db:
    image: postgres:14
    environment:
      POSTGRES_DB: backend
      POSTGRES_USER: backend
      POSTGRES_PASSWORD: backend
    volumes:
      - web_backend_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    volumes:
      - redis_cache:/data
    ports:
      - "6379:6379"


  backend:
    build:
      context: ./packages/backend
    image: saas/backend
    volumes:
      - ./packages/backend:/app
    env_file:
      - ./packages/backend/.env.shared
    depends_on:
      - db
      - redis
    ports:
      - "8000:80"


  localstack:
    image: localstack/localstack:2.3.0
    ports:
      - "4566:4566"
    environment:
      SERVICES: serverless,events,cloudformation,ses,secretsmanager
      DEFAULT_REGION: eu-west-1
      AWS_ACCESS_KEY_ID: foo
      AWS_SECRET_ACCESS_KEY: bar
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  mailcatcher:
    image: sj26/mailcatcher:v0.9.0
    ports:
      - "1080:1080"
      - "1025:1025"
